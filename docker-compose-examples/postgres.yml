# Degoog + PostgreSQL indexer backend.
# Good for: busy public instances where the SQLite indexer gets slow at scale.
# Postgres handles concurrent writes better and scales the full-text search further.
#
# Setup:
#   mkdir -p ./data && sudo chown -R 1000:1000 ./data
#   Set POSTGRES_PASSWORD in a .env file (or the environment) before starting;
#   startup fails fast if it is unset.

services:
  degoog:
    image: ghcr.io/degoog-org/degoog:latest
    volumes:
      - ./data:/app/data
    ports:
      - "4444:4444"
    restart: unless-stopped
    environment:
      DEGOOG_POSTGRES: "postgresql://degoog:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@degoog-postgres:5432/degoog"
    depends_on:
      degoog-postgres:
        condition: service_healthy

  degoog-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: degoog
      POSTGRES_USER: degoog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    user: "70:70"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U degoog -d degoog"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
